apiVersion: apps/v1
kind: Deployment
metadata:
  name: ehiring-backend-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ehiring-backend-router
  template:
    metadata:
      labels:
        app: ehiring-backend-router
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: ehiring-backend-router-config