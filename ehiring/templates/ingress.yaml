apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ehiring.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
spec:
  rules:
    - host: {{ .Values.global.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-ehiring-host-service
                port: 
                  number: 8080
          {{- range $name, $config := .Values }}
          {{- if and (kindIs "map" $config) (hasKey $config "router") ($config.router.enabled) }}
          {{- range $route := $config.router.routes }}
          - path: {{ $route.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $name }}-service
                port: 
                  number: 3000
          {{- end }}
          {{- end }}
          {{- end }}