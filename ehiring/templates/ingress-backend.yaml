apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "backend-service.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
spec:
  rules:
    - host: {{ include "ehiring.backend-service.host" . }}
      http:
        paths:
          {{- range $name, $config := .Values }}
          {{- if and (kindIs "map" $config) (hasKey $config "router") ($config.router.enabled) }}
          {{- if and (kindIs "map" $config) (hasKey $config "service") (hasKey $config.service "ingress") (eq $config.service.ingress.type "backend") }}
          {{- range $route := $config.router.routes }}
          - path: {{ $route.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $name }}-service
                port: 
                  number: {{ include "ehiring.backend-service.port" . }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- end }}