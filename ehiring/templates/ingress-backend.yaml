apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ehiring.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
spec:
  rules:
    {{- range $name, $config, $global := .Values }}
    {{- if and (kindIs "map" $config) (hasKey $config "service") (hasKey $config.service "ingress") (eq $config.service.ingress.type "frontend") }}
    {{- if and (kindIs "map" $config) (hasKey $config "router") ($config.router.enabled) }}
    {{- range $host := default $global.hosts $config.hosts }}
    - host: {{ $host }}
      http:
        paths:
        {{- range $route := $config.router.routes }}
          - path: {{ $route.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $name }}-service
                port: 
                  number: {{ $config.port }}
        {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}