apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ehiring.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  annotations:
    spec.ingressClassName: traefik
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
    traefik.ingress.kubernetes.io/ssl-redirect: {{ .Values.global.ssl.enabled | quote }}
    traefik.ingress.kubernetes.io/ssl-permanent-redirect: {{ .Values.global.ssl.enabled | quote }} 
spec:
  rules:
    {{- range $name, $config := .Values }}
    {{- if and (kindIs "map" $config) (hasKey $config "service") (hasKey $config.service "ingress") (eq $config.service.ingress.type "frontend") }}
    {{- range $host := default $.Values.global.hosts $config.hosts }}
    - host: {{ $host }}
      http:
        paths:
        {{- range $route := $config.router.routes }}
          - path: {{ $route.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $name }}-service
                port: 
                  number: {{ default 8080 $config.port }}
        {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}