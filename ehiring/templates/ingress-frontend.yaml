apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ehiring.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  annotations:
    spec.ingressClassName: traefik
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
    {{- if eq .Values.global.ssl.enabled "true" }}
    traefik.ingress.kubernetes.io/ssl-redirect: {{ .Values.global.ssl.enabled | quote }}
    traefik.ingress.kubernetes.io/ssl-permanent-redirect: {{ .Values.global.ssl.enabled | quote }} 
    # ssl for test dont use production
    cert-manager.io/cluster-issuer: {{ .Values.global.ssl.secretName }}
    ##
    {{- end }}
spec:
  rules:
    {{- range $name, $config := .Values }}
    {{- if and (kindIs "map" $config) (hasKey $config.service "ingress") (eq $config.service.ingress.type "frontend") }}
    {{- range $host := default $.Values.global.hosts $config.hosts }}
    - host: {{ $host }}
      http:
        paths:
        {{- range $route := $config.router.routes }}
          - path: {{ $route.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $name }}-service
                port: 
                  number: {{ default 8080 $config.service.port }}
        {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
  {{- if eq .Values.global.ssl.enabled "true" }}
  tls:
    - hosts:
        {{- range $name, $config := .Values }}
        {{- if and (kindIs "map" $config) (hasKey $config.service "ingress") (eq $config.service.ingress.type "frontend") }}
        {{- range $host := default $.Values.global.hosts $config.hosts }}
        - {{ $host }}
        {{- end }}
        {{- end }}
        {{- end }}
      secretName: letsencrypt-prod
  {{- end }}