apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-service.fullname" . }}-service-node-port
  labels:
    {{- include "backend-service.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend-service.selectorLabels" . | nindent 4 }}