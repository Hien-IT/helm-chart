apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-service-node-port
  labels:
    {{- include "backend-service.selectorLabels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30042
  selector:
    {{- include "backend-service.selectorLabels" . | nindent 4 }}
