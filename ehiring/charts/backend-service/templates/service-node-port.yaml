apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-service.fullname" . }}-node-port
  labels:
    {{- include "backend-service.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30042
  selector:
    {{- include "backend-service.selectorLabels" . | nindent 4 }}
