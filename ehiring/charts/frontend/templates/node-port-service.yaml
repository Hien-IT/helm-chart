apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.fullname" . }}-service-node-port
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30042
  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}