# Default values for ehiring.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

annotations: {}

global:
  ssl:
    enabled: true
    secretName: letsencrypt-prod
  hosts: 
    - "10.86.62.31.sslip.io"
  frontend:
    env:
      - name: APP_API
        value: /api
      - name: AUTH_SECURE_ROUTES
        value: "https://10.86.62.31.sslip.io:30443/"
      - name: AUTH_ISSUER
        value: https://id.paas.ttgt.vn/realms/smc-staging
      - name: AUTH_CLIENT_ID
        value: ehiring
  backendService:
    env:
      - name: APP_NAME
        value: ehiring
      - name: APP_LOGGER_LEVEL
        value: debug,log,error,warn,verbose
      # - name: MONGODB_USERNAME
      #   value: ehiring
      # - name: MONGODB_PASSWORD
      #   value: ehiring
      - name: APP_TENANT
        value: stg
      - name: MONGODB_DATABASE
        value: ehiring-stg
      - name: MONGODB_HOSTNAME
        value: "mongodb-service"
      - name: MONGODB_PORT
        value: "27017"
      - name: APP_FRONTEND_URL
        value: https://10.86.62.31.sslip.io:30443/
      - name: APP_PREFIX
        value: api
      - name: APP_STANDALONE
        value: "false"
      - name: NATS_SERVERS_1
        value: nats://nats-service:4222
      - name: OIDC_CLIENT_ID
        value: ehiring
      - name: OIDC_ISSUER
        value: https://id.paas.ttgt.vn/realms/smc-staging
      - name: OIDC_JWKS_URI
        value: https://id.paas.ttgt.vn/realms/smc-staging/protocol/openid-connect/certs

imagePullSecrets:
  - name: rc-registry-secret
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

cms-ehiring-portal:
  ingress:
    type: frontend
  service:
    port: 3000
  image:
    namespace: other
    repository: cms-ehiring-portal
  hosts: 
    - "tuyen-dung.tanlong.10.86.62.31.sslip.io"
    - "tuyen-dung.shlv.10.86.62.31.sslip.io"
  router:
    routes:
      - path: /

ehiring-host:
  hosts: 
    - "tanlong.10.86.62.31.sslip.io"
    - "shlv.10.86.62.31.sslip.io"
  ingress:
    type: frontend
  router:
    routes:
      - path: /

