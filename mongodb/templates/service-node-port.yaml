apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service-node-port
  labels:
    app: mongodb
spec:
  type: {{ .Values.serviceNodePort.type }}
  ports:
    - port: {{ .Values.serviceNodePort.port }}
      targetPort: 27017
      nodePort: {{ .Values.serviceNodePort.nodePort }}
  selector:
    app: mongodb